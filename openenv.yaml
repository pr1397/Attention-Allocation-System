name: smart-content-feed

entry_point: env.environment:AttentionEnv

tasks:
  - name: easy
    factory: env.tasks:task_easy
    grader: env.tasks:grade_easy

  - name: medium
    factory: env.tasks:task_medium
    grader: env.tasks:grade_medium

  - name: hard
    factory: env.tasks:task_hard
    grader: env.tasks:grade_hard

observation:
  type: Observation
  description: >
    User interest across 3 topics: Technology, Entertainment, Education.
    Items are content pieces with topic alignment, quality, novelty, and length.

action:
  type: Action

reward:
  type: Reward